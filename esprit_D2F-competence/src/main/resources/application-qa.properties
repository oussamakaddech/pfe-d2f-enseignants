# QA Environment Configuration

# Application
spring.application.name=competence-service
spring.main.allow-bean-definition-overriding=true

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres-service:5432/d2f}
spring.datasource.username=${DB_USER:app_user_competence}
spring.datasource.password=${DB_PASSWORD:d2fpasswd}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Server
server.port=8005

# JWT
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET:d2f-qa-secret-minimum-64-chars-do-not-use-in-production!!!}

# Logging
logging.level.org.springframework=INFO
logging.level.tn.esprit.d2f.competence=DEBUG

# ── Spring Cache (Caffeine) ────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s
spring.cache.cache-names=domaines-actifs,competences-by-domaine,ec-count
