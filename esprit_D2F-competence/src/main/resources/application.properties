# Application
spring.application.name=competence-service
spring.main.allow-bean-definition-overriding=true

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:7432/d2f}
spring.datasource.username=${DB_USER:d2f}
# IMPORTANT : ne jamais mettre de valeur ici — fournir DB_PASSWORD dans .env
spring.datasource.password=${DB_PASSWORD}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.sql.init.encoding=UTF-8

# Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Server
server.port=8005

# JWT
jwt.secret=${JWT_SECRET}

# Logging
logging.level.org.springframework=INFO

# ── Flyway (migrations) ───────────────────────────────────────────────────────
# baseline-on-migrate=true : permet à Flyway de s'initialiser sur un schéma
# existant (créé via ddl-auto=update) sans rejeter les tables déjà présentes.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_competence

# ── Spring Cache (Caffeine) ────────────────────────────────────────────────────
# Type de cache : Caffeine (haute performance, éviction configurable)
spring.cache.type=caffeine
# Spécifications des caches : taille max et durée d'expiration après écriture
# - domaines-actifs  : très stable, TTL 10 min
# - competences-by-domaine : moyennement stable, TTL 5 min
# - ec-count : compteurs par enseignant, TTL 5 min
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s
spring.cache.cache-names=domaines-actifs,competences-by-domaine,ec-count

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
