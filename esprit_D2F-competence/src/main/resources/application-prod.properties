# Production Environment Configuration

# Application
spring.application.name=competence-service
spring.main.allow-bean-definition-overriding=true

# Datasource
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres-service:5432/d2f}
spring.datasource.username=${DB_USER:app_user_competence}
spring.datasource.password=${DB_PASSWORD}

# JPA
# validate : Flyway gère les migrations, Hibernate ne modifie plus le schéma
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Server
server.port=8005

# JWT
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET}

# OpenAPI / Swagger : desactives en production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Tracing distribue
management.tracing.sampling.probability=${TRACING_SAMPLING:0.1}
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# Actuator : exposition minimale en production (health + info uniquement)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never

# Logging
logging.level.org.springframework=WARN
logging.level.tn.esprit.d2f.competence=INFO

# ── Spring Cache (Caffeine) ────────────────────────────────────────────────────
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=300s
spring.cache.cache-names=domaines-actifs,competences-by-domaine,ec-count

# ── Flyway (migrations) ───────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history_competence
