# ── Base config for unit tests (no real DB, no real auth needed) ──────────────
spring.application.name=competence-service-test

# In-memory H2 database — no PostgreSQL required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never

# JWT (dummy secret — ≥ 64 chars for HS512)
jwt.secret=testSecretKeyForUnitTestsOnlyDoNotUseInProductionXXXXXXXXXXXXXXXXX

# Server
server.port=0

# Logging — suppress noise during tests
logging.level.org.springframework=WARN
logging.level.tn.esprit=INFO
