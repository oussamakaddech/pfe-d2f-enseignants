# QA Environment Configuration
# Server
server.port=8080

# Application
spring.application.name=service-gateway

# Gateway Discovery
spring.cloud.config.enabled=false

########################################
# Gateway Routes
########################################
# Les routes sont definies dans routes.yml (importe par application.properties),
# source unique et canonique pour tous les profils. Ne PAS redefinir de table de
# routes inline ici : cela divergeait (ports errones, StripPrefix au lieu de
# RewritePath /api/v1, filtres de securite/rate-limit absents).
# Les URLs des services sont injectees via variables d'environnement
# (AUTH_SERVICE_URL, FORMATION_SERVICE_URL, ANALYSE_SERVICE_URL, ...) en QA.

########################################
# CORS Configuration (QA)
########################################
# Origin = scheme + host (+ port) uniquement, jamais de chemin ni de wildcard de path.
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[0]=http://qa-frontend:3000
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[1]=https://esprit-d2f.esprit.tn
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[5]=PATCH
# allow-credentials=true interdit allowed-headers=* (spec CORS) : on liste explicitement.
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[0]=Authorization
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[1]=Content-Type
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[2]=Accept
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

########################################
# Spring Boot Core
########################################
spring.main.allow-bean-definition-overriding=true

########################################
# Logging Configuration
########################################
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.example.servicegateway=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

########################################
# Health & Monitoring
########################################
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
