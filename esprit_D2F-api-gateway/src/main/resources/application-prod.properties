# Production Environment Configuration
# Server
server.port=8080

# Application
spring.application.name=service-gateway

# Gateway Discovery
spring.cloud.config.enabled=false

# Routes : definis dans routes.yml (importe par application.properties).
# Ne pas redefinir ici avec lb:// — aucun Eureka dans la stack Docker.
# Les URLs des services sont injectees via variables d'environnement dans docker-compose.

# Spring Main
spring.main.allow-bean-definition-overriding=true

# Logging Configuration for Production
logging.level.org.springframework.cloud.gateway=WARN
logging.level.com.example.servicegateway=INFO
logging.level.org.springframework=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Health and Monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# OpenAPI / Swagger : desactives en production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Tracing distribue
management.tracing.sampling.probability=${TRACING_SAMPLING:0.1}
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]

# JVM Configuration for Production
server.tomcat.max-threads=200
server.tomcat.max-connections=10000
spring.jpa.show-sql=false

# Security Configuration
server.error.include-stacktrace=never
server.error.include-message=never
