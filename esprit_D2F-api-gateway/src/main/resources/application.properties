# Rate Limiting â€” limites externalisÃ©es via variables d'environnement
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
# Login : 5 req/min par IP
rate-limit.login.replenish-rate=${RATE_LIMIT_LOGIN_RATE:5}
rate-limit.login.burst-capacity=${RATE_LIMIT_LOGIN_BURST:5}
rate-limit.login.requested-tokens=${RATE_LIMIT_LOGIN_TOKENS:1}

# Forgot-password : 3 req/5 min par IP (â‰ˆ 1 req/100s)
rate-limit.forgot-password.replenish-rate=${RATE_LIMIT_FORGOT_RATE:1}
rate-limit.forgot-password.burst-capacity=${RATE_LIMIT_FORGOT_BURST:3}
rate-limit.forgot-password.requested-tokens=${RATE_LIMIT_FORGOT_TOKENS:1}

# Routes publiques gÃ©nÃ©rales : 20 req/min par IP
rate-limit.default.replenish-rate=${RATE_LIMIT_DEFAULT_RATE:20}
rate-limit.default.burst-capacity=${RATE_LIMIT_DEFAULT_BURST:20}
rate-limit.default.requested-tokens=${RATE_LIMIT_DEFAULT_TOKENS:1}

# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
