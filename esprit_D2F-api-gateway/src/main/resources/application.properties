# Server
server.port=8222

# Application
spring.application.name=service-gateway

# Gateway Discovery
spring.cloud.config.enabled=false

# Gateway Routes — DEV (container names pour Docker Compose)
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://d2f-auth:8085}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[1].id=certificat-service
spring.cloud.gateway.routes[1].uri=${CERTIFICAT_SERVICE_URL:http://d2f-certificat:8086}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/certificat/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[2].id=evaluation-service
spring.cloud.gateway.routes[2].uri=${EVALUATION_SERVICE_URL:http://d2f-evaluation:8087}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/evaluation/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[3].id=formation-service
spring.cloud.gateway.routes[3].uri=${FORMATION_SERVICE_URL:http://d2f-formation:8088}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/formation/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[4].id=ai-reco-service
spring.cloud.gateway.routes[4].uri=${AI_RECO_SERVICE_URL:http://d2f-ai-reco:8000}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[5].id=besoinsformation-service
spring.cloud.gateway.routes[5].uri=${BESOIN_SERVICE_URL:http://d2f-besoin-formation:8004}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/besoinsformation/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=2

spring.cloud.gateway.routes[6].id=competence-service
spring.cloud.gateway.routes[6].uri=${COMPETENCE_SERVICE_URL:http://d2f-competence:8005}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/competence/**

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
# RewritePath: /api/competence/{X} → /api/v1/{X} (matches controller @RequestMapping("/api/v1/..."))
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/competence/(?<segment>.*), /api/v1/$\{segment}
spring.cloud.gateway.routes[6].filters[1]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

spring.cloud.gateway.routes[7].id=rice-service
spring.cloud.gateway.routes[7].uri=${RICE_SERVICE_URL:http://d2f-rice:8001}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/rice/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[7].filters[1]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# Analyse Predictive Service
spring.cloud.gateway.routes[8].id=analyse-service
spring.cloud.gateway.routes[8].uri=${ANALYSE_SERVICE_URL:http://d2f-predictive-analytics:8080}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/analyse/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=2

# Spring Cloud Gateway – allow large file uploads (PDF/DOCX) and slow AI responses
spring.codec.max-in-memory-size=100MB
spring.cloud.gateway.httpclient.response-timeout=300000
spring.cloud.gateway.httpclient.connect-timeout=10000

# CORS Configuration — externalisé via variables d'environnement
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[0]=${CORS_ORIGIN_WEBAPP:http://localhost:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[1]=${CORS_ORIGIN_WEBAPP_ALT:http://localhost:3000}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[5]=PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[0]=Authorization
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[1]=Content-Type
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[2]=Accept
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# Spring Main
spring.main.allow-bean-definition-overriding=true

# JWT — IMPORTANT : fournir JWT_SECRET via variable d'environnement
jwt.secret=${JWT_SECRET}
jwt.expiration=7200000
