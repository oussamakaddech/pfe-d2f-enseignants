# Gateway â€” large file uploads (PDF/DOCX) and slow AI responses
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
spring.codec.max-in-memory-size=100MB

# Timeouts par dÃ©faut (services standard)
spring.cloud.gateway.httpclient.connect-timeout=${GW_CONNECT_TIMEOUT:5000}
spring.cloud.gateway.httpclient.response-timeout=${GW_RESPONSE_TIMEOUT:5000}

# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•
# Resilience4j â€” Circuit Breaker (externalisÃ© via env vars)
# â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•â•

# -- Profil par defaut : services standard (auth, formation, etc.)
# minimum-number-of-calls : ne pas ouvrir avant N appels (evite faux positifs au demarrage)
# slow-call-* : compte aussi les appels lents comme echecs (proteger UX)
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=${CB_DEFAULT_WINDOW:20}
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=${CB_DEFAULT_MIN_CALLS:10}
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=${CB_DEFAULT_FAILURE_RATE:50}
resilience4j.circuitbreaker.configs.default.slow-call-rate-threshold=${CB_DEFAULT_SLOW_RATE:80}
resilience4j.circuitbreaker.configs.default.slow-call-duration-threshold=${CB_DEFAULT_SLOW_DURATION:3s}
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=${CB_DEFAULT_WAIT_DURATION:30s}
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

# -- Profil AI : services IA lents (analyse, reco, rice) - inferences couteuses
# Seuils plus tolerants car la latence variable est normale (chargement modeles ML).
resilience4j.circuitbreaker.configs.ai-services.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.ai-services.sliding-window-size=${CB_AI_WINDOW:20}
resilience4j.circuitbreaker.configs.ai-services.minimum-number-of-calls=${CB_AI_MIN_CALLS:10}
resilience4j.circuitbreaker.configs.ai-services.failure-rate-threshold=${CB_AI_FAILURE_RATE:60}
resilience4j.circuitbreaker.configs.ai-services.slow-call-rate-threshold=${CB_AI_SLOW_RATE:90}
resilience4j.circuitbreaker.configs.ai-services.slow-call-duration-threshold=${CB_AI_SLOW_DURATION:20s}
resilience4j.circuitbreaker.configs.ai-services.wait-duration-in-open-state=${CB_AI_WAIT_DURATION:60s}
resilience4j.circuitbreaker.configs.ai-services.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.ai-services.register-health-indicator=true
resilience4j.circuitbreaker.configs.ai-services.automatic-transition-from-open-to-half-open-enabled=true

# Instances â€” chaque service a son propre CB
resilience4j.circuitbreaker.instances.auth-cb.base-config=default
resilience4j.circuitbreaker.instances.certificat-cb.base-config=default
resilience4j.circuitbreaker.instances.evaluation-cb.base-config=default
resilience4j.circuitbreaker.instances.formation-cb.base-config=default
resilience4j.circuitbreaker.instances.besoin-cb.base-config=default
resilience4j.circuitbreaker.instances.competence-cb.base-config=default
resilience4j.circuitbreaker.instances.analyse-cb.base-config=ai-services
resilience4j.circuitbreaker.instances.ai-reco-cb.base-config=ai-services
resilience4j.circuitbreaker.instances.rice-cb.base-config=ai-services
resilience4j.circuitbreaker.instances.skill-passport-cb.base-config=default

# TimeLimiter â€” timeout par instance
resilience4j.timelimiter.configs.default.timeout-duration=${CB_DEFAULT_TIMEOUT:5s}
resilience4j.timelimiter.configs.ai-services.timeout-duration=${CB_AI_TIMEOUT:30s}
resilience4j.timelimiter.instances.auth-cb.base-config=default
resilience4j.timelimiter.instances.certificat-cb.base-config=default
resilience4j.timelimiter.instances.evaluation-cb.base-config=default
resilience4j.timelimiter.instances.formation-cb.base-config=default
resilience4j.timelimiter.instances.besoin-cb.base-config=default
resilience4j.timelimiter.instances.competence-cb.base-config=default
resilience4j.timelimiter.instances.analyse-cb.base-config=ai-services
resilience4j.timelimiter.instances.ai-reco-cb.base-config=ai-services
resilience4j.timelimiter.instances.rice-cb.base-config=ai-services
resilience4j.timelimiter.instances.skill-passport-cb.base-config=default

