spring.cloud.gateway.routes[3].filters[1]=AuthorizationFilter
spring.cloud.gateway.routes[3].filters[2]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── Formation Service (port 8088) ──
spring.cloud.gateway.routes[4].id=formation-service
spring.cloud.gateway.routes[4].uri=${FORMATION_SERVICE_URL:http://localhost:8088}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/formation/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/formation/(?<segment>.*), /api/v1/${segment}
