# Server
server.port=8080

# Application
spring.application.name=service-gateway

# Gateway Discovery
spring.cloud.config.enabled=false

# Routes externalisees dans routes.yml pour lisibilite (audit DSI - P2)
# Les routes Spring Cloud Gateway sont definies en YAML structure plutot que
# via la syntaxe indexee verbeuse [0]/[1] des properties.
spring.config.import=optional:classpath:routes.yml

