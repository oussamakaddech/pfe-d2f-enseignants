spring.cloud.gateway.routes[4].filters[2]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── Besoin Formation Service (port 8004) ──
spring.cloud.gateway.routes[5].id=besoinsformation-service
spring.cloud.gateway.routes[5].uri=${BESOIN_SERVICE_URL:http://localhost:8004}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/besoinsformation/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/besoinsformation/(?<segment>.*), /api/v1/${segment}
spring.cloud.gateway.routes[5].filters[1]=AuthorizationFilter
spring.cloud.gateway.routes[5].filters[2]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── Competence Service (port 8005) ──
spring.cloud.gateway.routes[6].id=competence-service
spring.cloud.gateway.routes[6].uri=${COMPETENCE_SERVICE_URL:http://localhost:8005}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/competence/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/competence/(?<segment>.*), /api/v1/${segment}
spring.cloud.gateway.routes[6].filters[1]=AuthorizationFilter
spring.cloud.gateway.routes[6].filters[2]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── RICE Service (port 8001) ──
spring.cloud.gateway.routes[7].id=rice-service
spring.cloud.gateway.routes[7].uri=${RICE_SERVICE_URL:http://localhost:8001}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/rice/**
spring.cloud.gateway.routes[7].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[7].filters[1]=AuthorizationFilter
spring.cloud.gateway.routes[7].filters[2]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── AI Recommendation Service (port 8000) ──
spring.cloud.gateway.routes[8].id=ai-reco-service
spring.cloud.gateway.routes[8].uri=${AI_RECO_SERVICE_URL:http://localhost:8000}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.routes[8].filters[0]=StripPrefix=2
spring.cloud.gateway.routes[8].filters[1]=AuthorizationFilter

# ── Analyse Predictive Service (port 8080) ──
spring.cloud.gateway.routes[9].id=analyse-service
spring.cloud.gateway.routes[9].uri=${ANALYSE_SERVICE_URL:http://localhost:8080}
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/analyse/**
spring.cloud.gateway.routes[9].filters[0]=StripPrefix=2
spring.cloud.gateway.routes[9].filters[1]=AuthorizationFilter

# ═══════════════════════════════════════════════════════════════════════
# Gateway — large file uploads (PDF/DOCX) and slow AI responses
# ═══════════════════════════════════════════════════════════════════════
spring.codec.max-in-memory-size=100MB
spring.cloud.gateway.httpclient.response-timeout=300000
spring.cloud.gateway.httpclient.connect-timeout=10000

# ═══════════════════════════════════════════════════════════════════════
# CORS Configuration
# ═══════════════════════════════════════════════════════════════════════
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[0]=${CORS_ORIGIN_WEBAPP:http://localhost:5173}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins[1]=${CORS_ORIGIN_WEBAPP_ALT:http://localhost:3000}
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[0]=GET
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[1]=POST
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[2]=PUT
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[3]=DELETE
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[4]=OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods[5]=PATCH
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[0]=Authorization
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[1]=Content-Type
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers[2]=Accept
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
spring.cloud.gateway.globalcors.cors-configurations.[/**].max-age=3600

# ═══════════════════════════════════════════════════════════════════════
# Spring Main
# ═══════════════════════════════════════════════════════════════════════
spring.main.allow-bean-definition-overriding=true

# ═══════════════════════════════════════════════════════════════════════
# JWT — IMPORTANT : fournir JWT_SECRET via variable d'environnement
# ═══════════════════════════════════════════════════════════════════════
jwt.secret=${JWT_SECRET:d2f_default_jwt_secret_key_for_local_dev_1234567890_abcdefghijklmnopqrstuvwxyz}
jwt.expiration=7200000

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
