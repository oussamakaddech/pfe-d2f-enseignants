# Server
server.port=8222

# Application
spring.application.name=service-gateway

# Gateway Discovery
spring.cloud.config.enabled=false

# ═══════════════════════════════════════════════════════════════════════
# Gateway Routes — chaque route passe par le filtre AuthorizationFilter
# ═══════════════════════════════════════════════════════════════════════

# ── Auth Service (port 8085) ──
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/auth/(?<segment>.*), /api/v1/auth/${segment}
spring.cloud.gateway.routes[0].filters[1]=AuthorizationFilter
spring.cloud.gateway.routes[0].filters[2]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── Auth Account Service (port 8085) ──
spring.cloud.gateway.routes[1].id=account-service
spring.cloud.gateway.routes[1].uri=${AUTH_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/account/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/account/(?<segment>.*), /api/v1/account/${segment}
spring.cloud.gateway.routes[1].filters[1]=AuthorizationFilter
spring.cloud.gateway.routes[1].filters[2]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST

# ── Certificat Service (port 8086) ──
