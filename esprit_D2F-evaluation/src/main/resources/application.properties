# Spring Main
spring.main.allow-bean-definition-overriding=true

  # Application
spring.application.name=evaluation-service

  # Datasource


spring.datasource.url=jdbc:postgresql://localhost:7432/d2f

spring.datasource.username=d2f
spring.datasource.password=d2fpasswd
  # JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

  # Artemis JMS
spring.artemis.mode=native
spring.artemis.broker-url=tcp://localhost:61616
spring.artemis.user=admin
spring.artemis.password=admin
spring.artemis.embedded.enabled=false
  # JMS Listener
spring.jms.listener.acknowledge-mode=auto

  # Server
server.port=8087


  # JWT
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET:d2f-dev-secret-minimum-64-chars-do-not-use-in-production!!}

  # ── Flyway (migrations) ────────────────────────────────────────────────────
  # baseline-on-migrate=true : Flyway considère le schéma existant comme V1
  # sans exécuter V1__baseline.sql (schéma déjà créé par ddl-auto=update)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

  # Logging
logging.level.org.springframework.security=DEBUG
