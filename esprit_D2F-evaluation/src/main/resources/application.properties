# Spring Main
spring.main.allow-bean-definition-overriding=true

  # Application
spring.application.name=evaluation-service

  # Datasource


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:7432/d2f}
spring.datasource.username=${DB_USER:d2f}
# IMPORTANT : ne jamais mettre de valeur ici — fournir DB_PASSWORD dans .env
spring.datasource.password=${DB_PASSWORD:d2fpasswd}
  # JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

  # RabbitMQ AMQP
spring.rabbitmq.host=${RABBITMQ_HOST:broker.dsi.local}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}
  # Rabbit Listener
spring.rabbitmq.listener.simple.acknowledge-mode=auto

  # Server
server.port=8087


  # JWT
jwt.secret=${JWT_SECRET:d2f_default_jwt_secret_key_for_local_dev_1234567890_abcdefghijklmnopqrstuvwxyz}

  # ── Flyway (migrations) ────────────────────────────────────────────────────
  # baseline-on-migrate=true : Flyway considère le schéma existant comme V1
  # sans exécuter V1__baseline.sql (schéma déjà créé par ddl-auto=update)
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=false

  # Logging
logging.level.org.springframework.security=DEBUG

  # DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
