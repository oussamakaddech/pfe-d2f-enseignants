# Spring Main
spring.main.allow-bean-definition-overriding=true

  # Application
spring.application.name=evaluation-service

  # Datasource

spring.datasource.url=undefined


spring.datasource.username=undefined
spring.datasource.password=undefined
  # JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

  # Artemis JMS
spring.artemis.broker-url=tcp://artemis-service:61616
spring.artemis.user=admin
spring.artemis.password=admin

  # JMS Listener
spring.jms.listener.acknowledge-mode=auto

  # Server
server.port=8087


  # JWT
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET:d2f-qa-secret-minimum-64-chars-do-not-use-in-production!!!}

  # Logging
logging.level.org.springframework.security=DEBUG
