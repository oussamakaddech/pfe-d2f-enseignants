# Spring Main
spring.main.allow-bean-definition-overriding=true

  # Application
spring.application.name=evaluation-service

  # Datasource

spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/d2f}
spring.datasource.username=${DB_USER:app_user_evaluation}
spring.datasource.password=${DB_PASSWORD}
  # JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

  # RabbitMQ AMQP
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}

  # Rabbit Listener
spring.rabbitmq.listener.simple.acknowledge-mode=auto

  # Server
server.port=8087


  # JWT
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET}

  # Logging
logging.level.org.springframework.security=DEBUG
