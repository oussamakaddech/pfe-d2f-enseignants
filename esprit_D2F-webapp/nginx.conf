server {
  listen       80;
  server_name  _;

  root   /usr/share/nginx/html;
  index  index.html;

  # ── Security headers (conformité DSI §12) ─────────────────────────────────
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  # CSP durcie :
  # - 'unsafe-eval' retire de script-src (aucun eval() dans les bundles Vite).
  # - 'unsafe-inline' conserve uniquement pour style-src (CSS-in-JS Ant Design)
  #   et pour script-src (preloader module de Vite : sans nonce-build, il est requis).
  # - connect-src restreint a self + API Gateway (override via build env si besoin).
  # - object-src 'none' : interdit Flash/PDF embed (vecteur XSS classique).
  # - base-uri 'self', form-action 'self', frame-ancestors 'none' : durcissements.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' https://*.esprit.tn; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" always;

  gzip on;
  gzip_types text/plain application/javascript application/json text/css text/xml application/xml application/xml+rss text/javascript;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico)$ {
    expires 7d;
    add_header Cache-Control "public";
  }
}
