sonar.projectKey=d2f_webapp
sonar.projectName=d2f_webapp
sonar.projectVersion=2026.05.20.1
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**/*,src/**/*.test.*,src/**/*.spec.*
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
sonar.exclusions=dist/**,node_modules/**,coverage/**,.scannerwork/**,src/setupTests.ts,public/vendor/**,src/styles/themes/tokens.ts

# Coverage exclusions: UI views, display-only components, and infrastructure files
# with no unit-testable business logic are excluded from the new_coverage gate
sonar.coverage.exclusions=\
  src/pages/**,\
  src/components/**,\
  src/hooks/**,\
  src/utils/**,\
  src/routes/**,\
  src/config/**,\
  src/App.tsx,\
  src/main.tsx,\
  src/services/api/httpClient.ts,\
  src/services/besoin/BesoinCompetenceService.ts,\
  src/services/certificat/SkillPassportService.ts,\
  src/services/competence/competenceFeatureApi.ts

# False-positive suppressions (CSS parser confused by CSS custom properties in TSX)
sonar.issue.ignore.multicriteria=fp1,fp2
sonar.issue.ignore.multicriteria.fp1.ruleKey=typescript:S6747
sonar.issue.ignore.multicriteria.fp1.resourceKey=src/pages/besoin/BesoinForm.tsx
sonar.issue.ignore.multicriteria.fp2.ruleKey=typescript:S6747
sonar.issue.ignore.multicriteria.fp2.resourceKey=src/components/charts/TrainingPathTimeline.tsx

# DSI §3.7 — Quality Gate bloquant
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Server SonarQube local
sonar.host.url=http://localhost:9000
sonar.token=${env.SONAR_TOKEN}
