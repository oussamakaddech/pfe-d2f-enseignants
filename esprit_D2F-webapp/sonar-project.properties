sonar.projectKey=d2f_webapp
sonar.projectName=d2f_webapp
sonar.projectVersion=2026.05.20.1
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**/*,src/**/*.test.*,src/**/*.spec.*
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
sonar.sourceEncoding=UTF-8
sonar.exclusions=dist/**,node_modules/**,coverage/**,.scannerwork/**,src/setupTests.ts,public/vendor/**,src/styles/themes/tokens.ts

# Coverage exclusions: UI views and display-only components have no unit-testable business logic
sonar.coverage.exclusions=\
  src/pages/**,\
  src/components/layout/**,\
  src/components/charts/**,\
  src/components/common/D2FDataCard.tsx,\
  src/components/common/D2FPageHeader.tsx,\
  src/components/common/D2FQuickActions.tsx,\
  src/components/common/D2FSearchBar.tsx,\
  src/components/common/D2FSection.tsx,\
  src/components/common/D2FStatusPill.tsx,\
  src/components/common/DataToolbar.tsx,\
  src/components/common/ActionBar.tsx,\
  src/utils/helpers/consultationViewUtils.ts,\
  src/utils/helpers/chartSetup.ts,\
  src/services/competence/competenceFeatureApi.ts

# DSI §3.7 — Quality Gate bloquant
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300
