# =============================================================================
# SonarQube — predictive-analytics-service (Python)
# Conformité DSI §2 : SonarQube Quality Gate bloquant
# =============================================================================

sonar.projectKey=d2f_predictive_analytics
sonar.projectName=d2f_predictive_analytics
sonar.projectVersion=2026.01.01.0

# Sources & Tests
sonar.sources=app
sonar.tests=tests
sonar.python.version=3.11

# Couverture
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit-results.xml

# Encodage
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.pytest_cache/**,data/**,init_db/**,*.json
sonar.test.exclusions=**/__pycache__/**,**/*.pyc

# DSI §3.7 — Quality Gate bloquant
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Server SonarQube local
sonar.host.url=http://localhost:9000
sonar.token=${env.SONAR_TOKEN}
