# QA Environment Configuration — auth-service
# ─────────────────────────────────────────────────────────────────────────────
# Toutes les valeurs sensibles DOIVENT être fournies via variables d'environnement.
# ─────────────────────────────────────────────────────────────────────────────

# ── Spring ────────────────────────────────────────────────────────────────────
spring.application.name=auth-service
spring.main.allow-bean-definition-overriding=true

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/d2f}
spring.datasource.username=${DB_USER:app_user_auth}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Flyway (migrations) ───────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.internal.dsi.local}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8085
server.error.include-stacktrace=never
server.error.include-message=never

# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=INFO
logging.level.esprit.pfe.auth=DEBUG
