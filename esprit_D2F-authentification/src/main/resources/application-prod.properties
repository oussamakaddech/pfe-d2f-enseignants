# Production Environment Configuration — auth-service
# ─────────────────────────────────────────────────────────────────────────────
# Toutes les valeurs sensibles DOIVENT être fournies via variables d'environnement.
# Aucune valeur en dur ne doit apparaître ici (conformité DSI §1.1).
# ─────────────────────────────────────────────────────────────────────────────

# ── Spring ────────────────────────────────────────────────────────────────────
spring.application.name=auth-service
spring.main.allow-bean-definition-overriding=true

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres-service:5432/d2f}
spring.datasource.username=${DB_USER:app_user_auth}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate : Flyway gère les migrations, Hibernate ne modifie plus le schéma
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Flyway (migrations) ───────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp.internal.dsi.local}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8085
server.error.include-stacktrace=never
server.error.include-message=never

# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.esprit.pfe.auth=INFO

# ── CORS (conformité DSI §2.3) ────────────────────────────────────────────────
# En production : fournir CORS_ALLOWED_ORIGINS via variable d'environnement
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Actuator (monitoring) ─────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── OpenAPI / Swagger (conformité DSI §4) ─────────────────────────────────────
# Swagger UI désactivé en prod pour la sécurité, /v3/api-docs reste accessible
springdoc.swagger-ui.enabled=false
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
