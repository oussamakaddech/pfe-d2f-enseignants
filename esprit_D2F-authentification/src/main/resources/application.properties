# Application
spring.application.name=auth-service

  # Datasource
spring.datasource.url=jdbc:postgresql://localhost:7432/d2f

spring.datasource.username=d2f
spring.datasource.password=d2fpasswd

  # JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

  # ── Flyway (migrations) ────────────────────────────────────────────────────
  # baseline-on-migrate=true : Flyway accepte un schéma existant comme V1 baseline
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

  # Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

  # Server
server.port=8085



  # JWT
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET:d2f-dev-secret-minimum-64-chars-do-not-use-in-production-1234567890}

  # Logging
logging.level.org.springframework.security=DEBUG

  # DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
