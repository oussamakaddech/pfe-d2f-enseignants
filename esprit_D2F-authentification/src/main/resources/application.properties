# Application
spring.application.name=auth-service

  # Datasource
# DEV UNIQUEMENT — pointer sur le conteneur Docker local
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:7432/d2f}
spring.datasource.username=${DB_USER:d2f}
# IMPORTANT : ne jamais mettre de valeur ici — fournir DB_PASSWORD dans .env
spring.datasource.password=${DB_PASSWORD}

  # JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

  # ── Flyway (migrations) ────────────────────────────────────────────────────
  # baseline-on-migrate=true : Flyway accepte un schéma existant comme V1 baseline
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

  # Mail
spring.mail.host=${MAIL_HOST:smtp.internal.dsi.local}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

  # Server
server.port=8085



  # JWT
# IMPORTANT : fournir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET}

  # Logging
logging.level.org.springframework.security=DEBUG

  # CORS (conformité DSI §2.3) — origines autorisées (DEV uniquement)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  # Actuator — expose health et info uniquement
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

  # DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
