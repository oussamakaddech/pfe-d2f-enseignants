# =============================================================================
# SonarQube — rice-service (Python)
# Conformité DSI §2 : SonarQube Quality Gate bloquant
# =============================================================================

sonar.projectKey=d2f_rice
sonar.projectName=d2f_rice
sonar.projectVersion=2026.01.01.0

# SonarQube server
sonar.host.url=http://localhost:9000

# Sources & Tests
sonar.sources=rice
sonar.tests=tests
sonar.python.version=3.13

# Couverture
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=junit-results.xml

# Encodage
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/.pytest_cache/**,_semantic_cache/**,refs/**,*.json,*.txt,debug_*.py,diag_*.py,main.py,rice_analyzer.py
sonar.test.exclusions=**/__pycache__/**,**/*.pyc

# DSI §3.7 — Quality Gate bloquant
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Token SonarQube
sonar.token=${env.SONAR_TOKEN}
