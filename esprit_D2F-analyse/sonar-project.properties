# =============================================================================
# SonarQube — analyse-service
# Conformité DSI §2 : SonarQube Quality Gate A bloquant
# =============================================================================

sonar.projectKey=d2f_analyse
sonar.projectName=d2f_analyse
sonar.projectVersion=2026.05.19.1

# Sources & Tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Rapports
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Encodage
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/target/**,**/*.class,**/generated-sources/**
sonar.test.exclusions=**/target/**

# Coverage exclusions DSI §3.7 — Feign clients (declarative interfaces tested
# via integration in dependent services), DTOs/entities (POJO getters/setters),
# exceptions, and config classes are not unit-testable in isolation.
sonar.coverage.exclusions=**/service/client/**,**/dto/**,**/entities/**,**/exception/**Exception.java,**/config/**

# Qualité — seuils minimum conformité DSI
sonar.qualitygate.wait=true
