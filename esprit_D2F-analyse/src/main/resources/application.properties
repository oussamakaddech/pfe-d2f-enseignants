server.port=8089
spring.application.name=service-analyse

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# URLs des microservices (externalisées via variables d'environnement)
services.evaluation.url=${EVALUATION_SERVICE_URL:http://d2f-evaluation:8087}
services.formation.url=${FORMATION_SERVICE_URL:http://d2f-formation:8088}
services.competence.url=${COMPETENCE_SERVICE_URL:http://d2f-competence:8005}
services.besoin-formation.url=${BESOIN_SERVICE_URL:http://d2f-besoin-formation:8004}

# JWT
jwt.secret=${JWT_SECRET}
