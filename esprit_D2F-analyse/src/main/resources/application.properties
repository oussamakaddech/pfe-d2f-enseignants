server.port=8089
spring.application.name=service-analyse

server.error.include-stacktrace=never
server.error.include-message=never

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# URLs des microservices (externalisées via variables d'environnement)
services.evaluation.url=${EVALUATION_SERVICE_URL:http://localhost:8087}
services.formation.url=${FORMATION_SERVICE_URL:http://localhost:8088}
services.competence.url=${COMPETENCE_SERVICE_URL:http://localhost:8005}
services.besoin-formation.url=${BESOIN_SERVICE_URL:http://localhost:8004}

# JWT
jwt.secret=${JWT_SECRET}

# Spring Data pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=200
