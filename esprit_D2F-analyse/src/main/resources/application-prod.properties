server.port=8089
server.error.include-stacktrace=never

# URLs des microservices (overridables via env vars)
services.evaluation.url=${SERVICES_EVALUATION_URL:http://evaluation-service:8087}
services.formation.url=${SERVICES_FORMATION_URL:http://formation-service:8088}
services.competence.url=${SERVICES_COMPETENCE_URL:http://competence-service:8005}
services.besoin-formation.url=${SERVICES_BESOIN_FORMATION_URL:http://besoin-formation-service:8004}

# Actuator : exposition minimale en production
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.show-components=never

# OpenAPI / Swagger : desactives en production (ne pas exposer la surface API).
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Tracing distribue
management.tracing.sampling.probability=${TRACING_SAMPLING:0.1}
logging.pattern.level=%5p [%X{traceId:-},%X{spanId:-}]