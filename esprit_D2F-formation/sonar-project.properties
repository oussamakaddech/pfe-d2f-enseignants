# =============================================================================
# SonarQube — formation-service
# Conformité DSI §2 : SonarQube Quality Gate A bloquant
# =============================================================================

sonar.projectKey=d2f_formation
sonar.projectName=d2f_formation
sonar.projectVersion=2026.05.20.2

# Sources & Tests
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Rapports
sonar.junit.reportPaths=target/surefire-reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Configuration de la couverture de code
sonar.java.coveragePlugin=jacoco
sonar.coverage.exclusions=**/dto/**,**/entities/**,**/config/**,**/exception/**,**/microsoft/**,**/messaging/**

# Encodage
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/target/**,**/*.class,**/generated-sources/**
sonar.test.exclusions=**/target/**

# Qualité — seuils minimum conformité DSI
sonar.qualitygate.wait=true
