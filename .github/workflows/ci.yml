# =============================================================================
# D2F CI Pipeline â€” DSI 2025-2026
# Ordre : lint -> test -> security (OWASP/npm audit bloquant)
#         -> sonar (Quality Gate bloquant) -> build & push Docker
# =============================================================================

name: D2F CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
      - 'hotfix/**'
      - 'release/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  MAVEN_OPTS: '-Xmx3072m'

jobs:
  # â”€â”€ Tests Backend Java â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  test-backend:
    name: Tests Backend â€” ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - esprit_D2F-authentification
          - esprit_D2F-competence
          - esprit_D2F-besoin-formation
          - esprit_D2F-formation
          - esprit_D2F-evaluation
          - esprit_D2F-certificat
          - esprit_D2F-analyse
          - esprit_D2F-api-gateway
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install shared security module
        working-directory: esprit_D2F-common-security
        run: mvn -B clean install -DskipTests

      - name: Build with Maven
        working-directory: ${{ matrix.service }}
        run: mvn -B clean compile -DskipTests

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: mvn -B test

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results â€” ${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  # â”€â”€ Tests Python â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  test-python:
    name: Tests Python â€” ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - esprit_D2F-rice
          - esprit_D2F-predictive-analytics
          - esprit_D2F-recommandation-formateur
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.service }}/requirements*.txt

      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
          else
            echo "No tests directory â€” skipping"
          fi

      - name: DSI Â§11.7 â€” interdire print() en production
        run: |
          FOUND=$(grep -rn --include="*.py" -E "^\s*print\(" \
            ${{ matrix.service }} \
            --exclude-dir tests \
            --exclude-dir __pycache__ \
            --exclude-dir .venv || true)
          if [ -n "$FOUND" ]; then
            echo "PII risk â€” print() trouvÃ© dans le code de production :"
            echo "$FOUND"
            exit 1
          fi

  # â”€â”€ Tests Frontend â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  test-frontend:
    name: Tests Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: esprit_D2F-webapp/package-lock.json

      - name: Install dependencies
        working-directory: esprit_D2F-webapp
        run: npm ci --legacy-peer-deps

      - name: Lint
        working-directory: esprit_D2F-webapp
        run: npm run lint

      - name: Type check
        working-directory: esprit_D2F-webapp
        run: npm run typecheck

      - name: Tests with coverage
        working-directory: esprit_D2F-webapp
        run: npm run test:coverage

      - name: Build production bundle
        working-directory: esprit_D2F-webapp
        run: npm run build

  # â”€â”€ OWASP Dependency Check (DSI Â§12.12 â€” CVSS â‰¥ 7 bloquant) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  security-backend:
    name: OWASP â€” ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        service:
          - esprit_D2F-authentification
          - esprit_D2F-competence
          - esprit_D2F-besoin-formation
          - esprit_D2F-formation
          - esprit_D2F-evaluation
          - esprit_D2F-certificat
          - esprit_D2F-analyse
          - esprit_D2F-api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'maven' }

      - name: Install shared security module
        working-directory: esprit_D2F-common-security
        run: mvn -B clean install -DskipTests

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: OWASP Dependency Check
        working-directory: ${{ matrix.service }}
        run: |
          SUPPRESSION=""
          [ -f owasp-suppressions.xml ] && SUPPRESSION="-DsuppressionFile=owasp-suppressions.xml"
          mvn -B org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=7 \
            -DassemblyAnalyzerEnabled=false \
            $SUPPRESSION \
            -Dformats=HTML,JSON

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-${{ matrix.service }}
          path: ${{ matrix.service }}/target/dependency-check-report.*
          retention-days: 30

  # â”€â”€ npm audit (DSI Â§12.12 â€” bloquant) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  security-frontend:
    name: npm audit (bloquant)
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: esprit_D2F-webapp/package-lock.json
      - name: Install
        working-directory: esprit_D2F-webapp
        run: npm ci --legacy-peer-deps
      - name: Audit high/critical
        working-directory: esprit_D2F-webapp
        run: npm audit --audit-level=high --omit=dev

  # â”€â”€ SonarQube Quality Gate (DSI Â§3.7 â€” bloquant) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  # ActivÃ© uniquement si SONAR_ENABLED=true est dÃ©fini dans Actions Variables.
  # Sans ce flag, le job est ignorÃ© et build-docker s'exÃ©cute quand mÃªme.
  sonar:
    name: SonarQube â€” ${{ matrix.module }}
    runs-on: self-hosted
    needs: [security-backend, security-frontend, test-python]
    if: >-
      vars.SONAR_ENABLED == 'true' &&
      (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    strategy:
      fail-fast: false
      matrix:
        include:
          - { module: esprit_D2F-api-gateway,      projectKey: d2f_api_gateway }
          - { module: esprit_D2F-authentification,  projectKey: d2f_authentification }
          - { module: esprit_D2F-besoin-formation,  projectKey: d2f_besoin_formation }
          - { module: esprit_D2F-certificat,        projectKey: d2f_certificat }
          - { module: esprit_D2F-competence,        projectKey: d2f_competence }
          - { module: esprit_D2F-evaluation,        projectKey: d2f_evaluation }
          - { module: esprit_D2F-formation,         projectKey: d2f_formation }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'maven' }

      - name: Install shared security module
        working-directory: esprit_D2F-common-security
        run: mvn -B clean install -DskipTests

      - name: Sonar scan + Quality Gate wait
        working-directory: ${{ matrix.module }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=${{ matrix.projectKey }} \
            -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.token=$SONAR_TOKEN \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

  # â”€â”€ Build & Push Docker (DSI Â§11 â€” aprÃ¨s tous les quality gates) â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
  build-docker:
    name: Docker Build & Push â€” ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: [security-backend, security-frontend, test-python, sonar]
    # Tourne si sonar a rÃ©ussi OU a Ã©tÃ© ignorÃ© (SONAR_ENABLED non activÃ©)
    if: >-
      always() &&
      needs.security-backend.result == 'success' &&
      needs.security-frontend.result == 'success' &&
      needs.test-python.result == 'success' &&
      (needs.sonar.result == 'success' || needs.sonar.result == 'skipped') &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: d2f-authentification,         context: ".",                                      file: "esprit_D2F-authentification/Dockerfile" }
          - { image: d2f-competence,               context: ".",                                      file: "esprit_D2F-competence/Dockerfile" }
          - { image: d2f-besoin-formation,         context: ".",                                      file: "esprit_D2F-besoin-formation/Dockerfile" }
          - { image: d2f-formation,                context: ".",                                      file: "esprit_D2F-formation/Dockerfile" }
          - { image: d2f-evaluation,               context: ".",                                      file: "esprit_D2F-evaluation/Dockerfile" }
          - { image: d2f-certificat,               context: ".",                                      file: "esprit_D2F-certificat/Dockerfile" }
          - { image: d2f-analyse,                  context: ".",                                      file: "esprit_D2F-analyse/Dockerfile" }
          - { image: d2f-api-gateway,              context: "esprit_D2F-api-gateway",                 file: "esprit_D2F-api-gateway/Dockerfile" }
          - { image: d2f-recommandation-formateur, context: "esprit_D2F-recommandation-formateur",    file: "esprit_D2F-recommandation-formateur/Dockerfile" }
          - { image: d2f-rice,                     context: "esprit_D2F-rice",                        file: "esprit_D2F-rice/Dockerfile" }
          - { image: d2f-predictive-analytics,     context: "esprit_D2F-predictive-analytics",        file: "esprit_D2F-predictive-analytics/Dockerfile" }
          - { image: d2f-webapp,                   context: "esprit_D2F-webapp",                      file: "esprit_D2F-webapp/Dockerfile" }
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.REGISTRY_URL }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

