# =============================================================================
# GitHub Actions — Pipeline CI D2F (conforme DSI 2025-2026)
# Ordre : lint -> build -> tests -> security (OWASP/npm audit bloquant)
#         -> sonar (Quality Gate bloquant) -> docker
# =============================================================================

name: D2F CI Pipeline

on:
  push:
    branches: [ main, develop, oussama ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '20'
  MAVEN_OPTS: '-Xmx3072m'

jobs:
  # ── Tests Backend Java ──────────────────────────────────────────────────────
  test-backend:
    name: Tests Backend - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - esprit_D2F-authentification
          - esprit_D2F-competence
          - esprit_D2F-besoin-formation
          - esprit_D2F-formation
          - esprit_D2F-evaluation
          - esprit_D2F-certificat
          - esprit_D2F-analyse
          - esprit_D2F-api-gateway
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Install shared security module
        working-directory: esprit_D2F-common-security
        run: mvn -B clean install -DskipTests

      - name: Build with Maven
        working-directory: ${{ matrix.service }}
        run: mvn -B clean compile -DskipTests

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: mvn -B test

      - name: Generate test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results - ${{ matrix.service }}
          path: ${{ matrix.service }}/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: true

  # ── Tests Python ────────────────────────────────────────────────────────────
  test-python:
    name: Tests Python - ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - esprit_D2F-rice
          - esprit_D2F-predictive-analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ${{ matrix.service }}/requirements*.txt
      - name: Install dependencies
        working-directory: ${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run tests
        working-directory: ${{ matrix.service }}
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
          else
            echo "No tests directory found, skipping tests"
          fi

      - name: DSI §11.7 - forbid raw print() outside tests
        run: |
          FOUND=$(grep -rn --include="*.py" -E "^\s*print\(" \
            ${{ matrix.service }} \
            --exclude-dir tests \
            --exclude-dir __pycache__ \
            --exclude-dir .venv || true)
          if [ -n "$FOUND" ]; then
            echo "PII risk - print() found in production code:"
            echo "$FOUND"
            exit 1
          fi

  # ── Tests Frontend + npm audit (bloquant) ───────────────────────────────────
  test-frontend:
    name: Tests Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: esprit_D2F-webapp/package-lock.json

      - name: Install dependencies
        working-directory: esprit_D2F-webapp
        run: npm ci --legacy-peer-deps

      - name: Run linter
        working-directory: esprit_D2F-webapp
        run: npm run lint

      - name: Run type check
        working-directory: esprit_D2F-webapp
        run: npm run typecheck

      - name: Run tests
        working-directory: esprit_D2F-webapp
        run: npm run test:coverage

      - name: Build
        working-directory: esprit_D2F-webapp
        run: npm run build

  # ── SÉCURITÉ — OWASP Dependency Check (DSI §12.12 — bloquant) ───────────────
  security-backend:
    name: OWASP Dependency Check - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test-backend
    strategy:
      fail-fast: false
      matrix:
        service:
          - esprit_D2F-authentification
          - esprit_D2F-competence
          - esprit_D2F-besoin-formation
          - esprit_D2F-formation
          - esprit_D2F-evaluation
          - esprit_D2F-certificat
          - esprit_D2F-analyse
          - esprit_D2F-api-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'maven' }

      - name: Install shared security module
        working-directory: esprit_D2F-common-security
        run: mvn -B clean install -DskipTests

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-${{ github.run_id }}
          restore-keys: owasp-nvd-${{ runner.os }}-

      - name: OWASP Dependency Check (fail on CVSS >= 7)
        working-directory: ${{ matrix.service }}
        run: |
          if [ -f owasp-suppressions.xml ]; then
            mvn -B org.owasp:dependency-check-maven:check \
              -DfailBuildOnCVSS=7 \
              -DassemblyAnalyzerEnabled=false \
              -DsuppressionFile=owasp-suppressions.xml \
              -Dformats=HTML,JSON
          else
            mvn -B org.owasp:dependency-check-maven:check \
              -DfailBuildOnCVSS=7 \
              -DassemblyAnalyzerEnabled=false \
              -Dformats=HTML,JSON
          fi

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-${{ matrix.service }}
          path: ${{ matrix.service }}/target/dependency-check-report.*

  # ── SÉCURITÉ — npm audit bloquant (frontend) ────────────────────────────────
  security-frontend:
    name: npm audit (frontend, bloquant)
    runs-on: ubuntu-latest
    needs: test-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: esprit_D2F-webapp/package-lock.json
      - name: Install
        working-directory: esprit_D2F-webapp
        run: npm ci --legacy-peer-deps
      - name: Audit high/critical (bloquant)
        working-directory: esprit_D2F-webapp
        run: npm audit --audit-level=high --omit=dev

  # ── SonarQube Quality Gate bloquant (DSI §3.7) ──────────────────────────────
  sonar:
    name: SonarQube Quality Gate
    runs-on: ubuntu-latest
    needs: [security-backend, security-frontend, test-python]
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: esprit_D2F-api-gateway
            projectKey: d2f_api_gateway
          - module: esprit_D2F-authentification
            projectKey: d2f_authentification
          - module: esprit_D2F-besoin-formation
            projectKey: d2f_besoin_formation
          - module: esprit_D2F-certificat
            projectKey: d2f_certificat
          - module: esprit_D2F-competence
            projectKey: d2f_competence
          - module: esprit_D2F-evaluation
            projectKey: d2f_evaluation
          - module: esprit_D2F-formation
            projectKey: d2f_formation
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: 'maven' }

      - name: Install shared security module
        working-directory: esprit_D2F-common-security
        run: mvn -B clean install -DskipTests

      - name: Sonar scan with Quality Gate wait
        working-directory: ${{ matrix.module }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn -B verify sonar:sonar \
            -Dsonar.projectKey=${{ matrix.projectKey }} \
            -Dsonar.host.url=$SONAR_HOST_URL \
            -Dsonar.login=$SONAR_TOKEN \
            -Dsonar.qualitygate.wait=true \
            -Dsonar.qualitygate.timeout=300

  # ── Build Docker Images (uniquement si tout vert) ───────────────────────────
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [sonar]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build all images
        run: |
          export IMAGE_TAG=${GITHUB_SHA::7}
          export REGISTRY=${{ secrets.REGISTRY_URL }}
          docker compose build --pull
