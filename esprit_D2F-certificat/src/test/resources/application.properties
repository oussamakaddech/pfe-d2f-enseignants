# ── Test config for certificat service (no real DB needed) ────────────────────
spring.application.name=certificat-service-test

# In-memory H2 database — no PostgreSQL required
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.sql.init.mode=never
spring.flyway.enabled=false

# RabbitMQ — keep beans alive but disable listener auto-startup
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.listener.simple.auto-startup=false
spring.rabbitmq.listener.direct.auto-startup=false

# JWT (dummy secret — ≥ 64 chars for HS512)
jwt.secret=testSecretKeyForUnitTestsOnlyDoNotUseInProductionXXXXXXXXXXXXXXXXX

# Server
server.port=0

# Logging — suppress noise during tests
logging.level.org.springframework=WARN
logging.level.esprit.pfe=INFO
