# Application
spring.application.name=certificat-service

  # Datasource

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:7432/d2f}
spring.datasource.username=${DB_USER:d2f}
# IMPORTANT : ne jamais mettre de valeur ici — fournir DB_PASSWORD dans .env
spring.datasource.password=${DB_PASSWORD}
  # JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

  # RabbitMQ AMQP
spring.rabbitmq.host=${RABBITMQ_HOST:broker.dsi.local}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:}

  # Server
server.port=8086

  # ── Flyway (migrations) ───────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration



  # JWT
jwt.secret=${JWT_SECRET}

  # Logging
logging.level.org.springframework.security=DEBUG

  # Certificate PDF Configuration
certificate.pdf.background-image=classpath:templates/background.jpg

  # DevTools
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
