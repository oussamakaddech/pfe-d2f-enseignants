# Production Environment Configuration — certificat-service
# ─────────────────────────────────────────────────────────────────────────────
# Toutes les valeurs sensibles DOIVENT être fournies via variables d'environnement.
# Aucune valeur en dur ne doit apparaître ici (conformité DSI §1.1).
# ─────────────────────────────────────────────────────────────────────────────

# ── Spring ────────────────────────────────────────────────────────────────────
spring.application.name=certificat-service
spring.main.allow-bean-definition-overriding=true

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres-service:5432/d2f}
spring.datasource.username=${DB_USER:app_user_certificat}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate : Flyway gère les migrations, Hibernate ne modifie plus le schéma
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Flyway (migrations) ───────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# ── Artemis (JMS) ─────────────────────────────────────────────────────────────
spring.artemis.broker-url=${ARTEMIS_URL:tcp://artemis-service:61616}
spring.artemis.user=${ARTEMIS_USER:admin}
spring.artemis.password=${ARTEMIS_PASSWORD}
spring.artemis.embedded.enabled=false

# ── JMS Listener ──────────────────────────────────────────────────────────────
spring.jms.listener.acknowledge-mode=auto

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8086
server.error.include-stacktrace=never
server.error.include-message=never

# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET}

# ── Certificate PDF ───────────────────────────────────────────────────────────
certificate.pdf.background-image=classpath:templates/background.jpg

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.tn.esprit.d2f=INFO
