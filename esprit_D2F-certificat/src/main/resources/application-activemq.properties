# =============================================================================
# Profil ActiveMQ Artemis — Alternative à RabbitMQ (DSI §3.5)
# Activer avec : --spring.profiles.active=activemq
# =============================================================================
spring.rabbitmq.listener.simple.auto-startup=false
spring.artemis.mode=embedded
spring.artemis.embedded.enabled=false
spring.artemis.host=${ARTEMIS_HOST:artemis.dsi.local}
spring.artemis.port=${ARTEMIS_PORT:61616}
spring.artemis.user=${ARTEMIS_USER:d2f}
spring.artemis.password=${ARTEMIS_PASSWORD:}
