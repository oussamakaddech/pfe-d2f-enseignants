# Production Environment Configuration

# ── Spring ────────────────────────────────────────────────────────────────────
spring.main.allow-bean-definition-overriding=true
spring.application.name=besoinsformation-service

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres-service:5432/d2f}
spring.datasource.username=${DB_USER:app_user_besoinsformation}
spring.datasource.password=${DB_PASSWORD}

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# validate : Flyway gère les migrations, Hibernate ne modifie plus le schéma
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Flyway (migrations) ───────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.locations=classpath:db/migration

# ── RabbitMQ (AMQP) ───────────────────────────────────────────────────────────
spring.rabbitmq.host=${RABBITMQ_HOST:broker.dsi.local}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER}
spring.rabbitmq.password=${RABBITMQ_PASSWORD}

# ── Rabbit Listener ───────────────────────────────────────────────────────────
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8004

# ── JWT ───────────────────────────────────────────────────────────────────────
# IMPORTANT : définir JWT_SECRET comme variable d'environnement (min 64 chars, HS512)
jwt.secret=${JWT_SECRET}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.org.springframework=WARN
logging.level.org.springframework.security=WARN
logging.level.tn.esprit.d2f=INFO
